<div class="p-6 max-w-4xl mx-auto">


    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-white">Demandes en cours</h2>
    </div>

    @if (interventions.length === 0) {
    <div class="text-center py-12 text-gray-500">
        <p class="text-lg">Aucune demande pour le moment.</p>
    </div>
    }

    <div class="space-y-3">
        @for (intervention of interventions; track intervention.id) {
        <div class="bg-white border rounded-xl p-4 shadow-sm flex justify-between items-center">
            <div>
                <p class="font-semibold text-gray-800">{{ intervention.title }}</p>
                <p class="text-sm text-gray-500">{{ intervention.location }}</p>
                <p class="text-sm text-gray-500">{{ intervention.created_at | date:'dd/MM/yyyy' }}</p>
            </div>
            <span class="px-3 py-1 rounded-full text-sm font-medium" [class]="getStatusClass(intervention.status)">
                {{ intervention.status }}
            </span>
            <div class="flex gap-3 pt-2">
                <button type="button" (click)="validate(intervention.id)"
                    class="flex-1 border bg-green-200 text-white px-4 py-2 rounded-lg hover:bg-green-500 transition">
                    Valider
                </button>
                <button type="button" (click)="reject(intervention.id)"
                    class="flex-1 bg-red-200 text-white px-4 py-2 rounded-lg hover:bg-red-500 transition">
                    Annuler
                </button>
            </div>
        </div>
        }
    </div>
